name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  
permissions:
  contents: write # required to push to cd repository with github_token or PAT

env:
  IMAGE_TAG: ${{ github.sha }} #

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: '23' 

      - name: Frontend-Complilation (Syntax-Check)
        run: |
          cd client
          find . -name "*.js" -exec node --check {} +      


      - name: Backend-Complilation (Syntax-Check)
        run: |
          cd api
          find . -name "*.js" -exec node --check {} +

  gitleaks-scan:  #job to scan for secrets in the codebase using gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gitleaks setup
        uses: gitleaks/gitleaks-action@v2

      - name: Gitleaks scan
        run: |
          gitleaks detect --source  ./client --exit-code 1
          gitleaks detect --source ./api --exit-code 1

  trivy-fs-scan:
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scannner (FS)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: false
          vuln-type: os,library
          severity: CRITICAL,HIGH

  build_backend_docker_image_and_push:
    runs-on: ubuntu-latest
    needs: trivy-fs-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push Docker image (Backend)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            akashshinde1808/backend:latest
            akashshinde1808/backend:${{ env.IMAGE_TAG }}

  build_frontend_docker_image_and_push:
    runs-on: ubuntu-latest
    needs: trivy-fs-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push Docker image (Frontend)
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            akashshinde1808/frontend:latest
            akashshinde1808/frontend:${{ env.IMAGE_TAG }}

  trivy-image-scan:
    runs-on: ubuntu-latest   
    needs:
      - build_backend_docker_image_and_push
      - build_frontend_docker_image_and_push
    steps:
      - name: Run trivy image scan for backend
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: image   
          image-ref: akashshinde1808/backend:${{ env.IMAGE_TAG }}  
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Run trivy image scan for frontend
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: image   
          image-ref: akashshinde1808/frontend:${{ env.IMAGE_TAG }}  
          format: table
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: os,library 
          severity: CRITICAL,HIGH
        env:
          TRIVY_USERNAME: ${{ vars.DOCKER_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}

      
  update_cd_repo:
    runs-on: ubuntu-latest
    needs: trivy-image-scan
  
    steps:
      - name: Checkout CD repo
        uses: actions/checkout@v4
        with:
          repository: akash-u-shinde/3-Tier-GitOps-CD
          ref: main
          token: ${{ secrets.CD_REPO_TOKEN }}
          path: cd
          persist-credentials: true
  
      - name: Bump images
        working-directory: cd
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          curl -sL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o yq && sudo install yq /usr/local/bin/yq
  
          yq -i '(. | select(.kind=="Service")) |= del(.spec.template)' k8s-prod/backend.yaml
          yq -i '(. | select(.kind=="Service")) |= del(.spec.template)' k8s-prod/frontend.yaml
  
          yq -i '
            (. | select(.kind=="Deployment")
               | .spec.template.spec.containers[]
               | select(.name=="backend")
               | .image)
            = "akashshinde1808/backend:" + strenv(IMAGE_TAG)
          ' k8s-prod/backend.yaml
  
          yq -i '
            (. | select(.kind=="Deployment")
               | .spec.template.spec.containers[]
               | select(.name=="frontend")
               | .image)
            = "akashshinde1808/frontend:" + strenv(IMAGE_TAG)
          ' k8s-prod/frontend.yaml
  
      - name: Commit & push
        working-directory: cd
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add -A
          git commit -m "bump images to ${IMAGE_TAG}" || echo "no changes"
          git push https://akash-u-shinde:${{ secrets.CD_REPO_TOKEN }}@github.com/akash-u-shinde/3-Tier-GitOps-CD.git
